<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 English Speaking Practice - Grade 10</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .student-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); margin-bottom: 25px; }
    #chat { background: #f8f9fa; padding: 20px; border-radius: 15px; height: 400px; overflow-y: auto; margin-bottom: 20px; border: 2px solid #dee2e6; }
    
    /* Style cho vòng tròn điểm số */
    #score-panel { display: none; background: #fff; border: 2px solid #667eea; border-radius: 15px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.5s; }
    .score-flex { display: flex; align-items: center; gap: 20px; }
    #score-circle { width: 70px; height: 70px; border-radius: 50%; background: #4e73df; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    #feedback-text { flex: 1; color: #333; font-size: 1rem; line-height: 1.5; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    input { flex: 1; min-width: 200px; padding: 15px; border-radius: 25px; border: 2px solid #dee2e6; font-size: 16px; }
    button { padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-primary { background: #667eea; color: white; }
    .btn-mic { background: #4facfe; color: white; }
    .btn-unit { background: #43e97b; color: white; margin: 5px; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎧 English Practice - Grade 10</h1>

    <div class="student-section">
      <h3 style="text-align: center; margin-bottom: 15px;">📚 Choose Your Unit</h3>
      <div id="unitButtons" style="text-align: center;"></div>
    </div>

    <div class="student-section">
      <h3 id="chatTitle">💬 Chat với cô giáo AI</h3>
      <div id="chat"></div>

      <div id="score-panel">
        <div class="score-flex">
          <div id="score-circle">0</div>
          <div id="feedback-text">Đang chờ nhận xét...</div>
        </div>
      </div>

      <div class="controls">
        <input id="message" placeholder="Type your answer here...">
        <button class="btn-primary" onclick="sendMessage()">Send</button>
        <button id="mic" class="btn-mic">🎤 Speak</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const messageInput = document.getElementById("message");
    let currentUnit = null;

    // Load danh sách Unit
    async function loadUnits() {
      const res = await fetch("/units/list");
      const data = await res.json();
      const container = document.getElementById("unitButtons");
      data.units.forEach(u => {
        const btn = document.createElement("button");
        btn.className = "btn-unit";
        btn.innerHTML = `Unit ${u.unit}: ${u.title}`;
        btn.onclick = () => startUnit(u.unit);
        container.appendChild(btn);
      });
    }

    async function startUnit(unitNum) {
      currentUnit = unitNum;
      chat.innerHTML = `<p style="text-align:center;"><b>⏳ Đang tải Unit ${unitNum}...</b></p>`;
      const res = await fetch("/units/start", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({unit: unitNum, student_name: "Học sinh lớp 10"})
      });
      const data = await res.json();
      chat.innerHTML = `<p><b>🤖 Bot:</b> ${data.question}</p>`;
      speak(data.question);
    }

    async function sendMessage() {
      const msg = messageInput.value;
      if(!msg) return;
      
      chat.innerHTML += `<p style="text-align:right;"><b>👤 You:</b> ${msg}</p>`;
      messageInput.value = "";

      const res = await fetch("/units/answer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({answer: msg})
      });
      const data = await res.json();

      // HIỂN THỊ ĐIỂM VÀ FEEDBACK VÀO VÒNG TRÒN
      if(data.score !== undefined) {
        document.getElementById("score-panel").style.display = "block";
        const circle = document.getElementById("score-circle");
        circle.innerText = data.score;
        
        // Đổi màu vòng tròn theo điểm
        if(data.score >= 8) circle.style.background = "#27ae60";
        else if(data.score >= 5) circle.style.background = "#f39c12";
        else circle.style.background = "#e74c3c";

        document.getElementById("feedback-text").innerHTML = data.feedback;
      }

      if(data.next_question) {
        chat.innerHTML += `<p><b>🤖 Bot:</b> ${data.next_question}</p>`;
        speak(data.next_question);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function speak(text) {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'en-US';
      window.speechSynthesis.speak(msg);
    }

    loadUnits();
  </script>
</body>
</html>
