<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Practice Grade 10</title>
  <style>
    body { font-family: sans-serif; background: #667eea; padding: 10px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    h2 { text-align: center; color: #667eea; margin-bottom: 20px; }
    #unitList { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #f0f4ff; border-radius: 15px; }
    .btn-unit { background: #43e97b; color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; }
    #chat { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; background: #fafafa; border-radius: 10px; }
    .bot { color: #2196f3; margin: 5px 0; }
    .user { color: #4caf50; text-align: right; margin: 5px 0; }
    .feedback { background: #fff9c4; padding: 10px; border-radius: 10px; margin: 5px 0; font-size: 0.9em; border-left: 5px solid #fbc02d; }
    .controls { display: flex; gap: 5px; }
    input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    button { padding: 10px 15px; border-radius: 20px; border: none; background: #667eea; color: white; cursor: pointer; font-weight: bold; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
  </style>
</head>
<body>

<div id="nameModal" class="modal" style="display: flex;">
  <div style="background: white; padding: 30px; border-radius: 20px; text-align: center;">
    <h3>👤 Nhập tên của em</h3>
    <input type="text" id="stName" style="width: 100%; margin: 20px 0;">
    <button onclick="saveName()" style="width: 100%;">Bắt đầu</button>
  </div>
</div>

<div class="container">
  <h2>🎧 English Grade 10</h2>
  
  <div id="unitList">Đang tải bài học...</div>

  <div id="chat"></div>

  <div class="controls">
    <input id="uInp" placeholder="Trả lời vào đây...">
    <button onclick="send()">Gửi</button>
    <button id="mBtn" style="background: #4facfe;" onclick="stMic()">🎤</button>
  </div>
</div>

<script>
  let uNum = null, name = "", scores = [], isL = false, rec = null;

  function saveName() {
    name = document.getElementById("stName").value;
    if(!name) return alert("Nhập tên em nhé");
    document.getElementById("nameModal").style.display = "none";
  }

  async function loadU() {
    try {
      const r = await fetch("/units/list");
      const d = await r.json();
      const div = document.getElementById("unitList");
      div.innerHTML = "";
      d.units.forEach(u => {
        const b = document.createElement("button");
        b.className = "btn-unit";
        b.innerText = "Unit " + u.unit;
        b.onclick = () => start(u.unit);
        div.appendChild(b);
      });
    } catch(e) { document.getElementById("unitList").innerText = "Lỗi tải bài. Thử lại sau."; }
  }

  async function start(n) {
    if(!name) return document.getElementById("nameModal").style.display = "flex";
    uNum = n;
    const div = document.getElementById("chat");
    div.innerHTML = `<p style="text-align:center">--- Unit ${n} ---</p>`;
    scores = [];
    const r = await fetch("/units/start", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({unit: n, student_name: name})
    });
    const d = await r.json();
    add("bot", d.question);
    spk(d.question);
  }

  async function send() {
    const val = document.getElementById("uInp").value;
    if(!val) return;
    add("user", val);
    document.getElementById("uInp").value = "";
    const r = await fetch("/units/answer", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({answer: val})
    });
    const d = await r.json();
    if(d.score) {
      scores.push(parseFloat(d.score));
      const div = document.getElementById("chat");
      div.innerHTML += `<div class="feedback"><b>Điểm: ${d.score}</b><br>${d.feedback}</div>`;
    }
    if(d.next_question) {
      add("bot", d.next_question);
      spk(d.next_question);
    } else {
      const avg = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
      add("bot", `Xong rồi! Điểm TB của em là: ${avg}`);
    }
    document.getElementById("chat").scrollTop = 9999;
  }

  function add(r, t) { document.getElementById("chat").innerHTML += `<div class="${r}"><b>${r=='bot'?'🤖':'👤'}:</b> ${t}</div>`; }
  function spk(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang='en-US'; window.speechSynthesis.speak(m); }
  
  function stMic() {
    const R = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!R) return alert("Không hỗ trợ Mic");
    if(!isL) {
      rec = new R(); rec.lang = 'en-US'; rec.continuous = true;
      rec.onstart = () => { isL=true; document.getElementById("mBtn").innerText="🛑"; };
      rec.onresult = (e) => { document.getElementById("uInp").value = e.results[e.results.length-1][0].transcript; };
      rec.start();
    } else {
      rec.stop(); isL=false; document.getElementById("mBtn").innerText="🎤";
      setTimeout(send, 500);
    }
  }

  loadU();
</script>
</body>
</html>
