<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 English Speaking Practice - Grade 10</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 15px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 2em; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); margin-bottom: 20px; }
    #chat { background: #f8f9fa; padding: 15px; border-radius: 15px; height: 380px; overflow-y: auto; border: 1px solid #ddd; margin-bottom: 15px; }
    .bot-msg { background: #e3f2fd; border-left: 5px solid #2196f3; padding: 12px; border-radius: 12px; margin: 10px 0; }
    .user-msg { background: #c8e6c9; border-right: 5px solid #4caf50; padding: 12px; border-radius: 12px; margin: 10px 0; text-align: right; }
    .feedback-box { background: #fffde7; border: 1px dashed #fbc02d; padding: 12px; border-radius: 12px; margin: 10px 0; display: flex; align-items: center; gap: 12px; }
    .score-circle { width: 50px; height: 50px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; font-size: 1.2em; }
    .final-score { background: #ffeb3b; border: 2px solid #fbc02d; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; font-weight: bold; font-size: 1.2em; }
    .controls { display: flex; gap: 8px; }
    input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
    button { padding: 12px 20px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; color: white; }
    .btn-send { background: #667eea; }
    .btn-mic { background: #4facfe; }
    .btn-unit { background: #43e97b; color: white; margin: 5px; padding: 10px; border-radius: 12px; border:none; cursor:pointer;}
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
  </style>
</head>
<body>

<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>👤 Nhập tên để bắt đầu</h3>
    <input type="text" id="studentName" placeholder="Tên của em..." style="width: 100%; margin: 15px 0; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
    <button class="btn-send" style="width: 100%;" onclick="startPractice()">🚀 Bắt đầu</button>
  </div>
</div>

<div class="container">
  <h1>🎧 English Grade 10</h1>
  <div class="card"><div id="unitList" style="text-align: center;">Đang tải bài tập...</div></div>
  <div class="card">
    <div id="chat"></div>
    <div class="controls">
      <input id="userInput" placeholder="Nhập câu trả lời...">
      <button class="btn-send" onclick="handleSend()">Gửi</button>
      <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
    </div>
  </div>
</div>

<script>
  let currentUnit = null, name = "", scores = [], recognition = null, isListening = false;

  async function getUnits() {
    try {
      const r = await fetch("/units/list");
      const d = await r.json();
      const div = document.getElementById("unitList");
      div.innerHTML = "";
      d.units.forEach(u => {
        const b = document.createElement("button");
        b.className = "btn-unit";
        b.innerHTML = `Unit ${u.unit}`;
        b.onclick = () => { currentUnit = u.unit; document.getElementById("loginModal").classList.add("show"); };
        div.appendChild(b);
      });
    } catch(e) { console.error(e); }
  }

  async function startPractice() {
    name = document.getElementById("studentName").value;
    if(!name) return alert("Em hãy nhập tên nhé!");
    document.getElementById("loginModal").classList.remove("show");
    
    // Mở khóa tiếng
    const unlock = new SpeechSynthesisUtterance("Welcome");
    unlock.volume = 0;
    window.speechSynthesis.speak(unlock);

    scores = [];
    document.getElementById("chat").innerHTML = "";
    const r = await fetch("/units/start", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({unit: currentUnit, student_name: name})
    });
    const d = await r.json();
    addMsg("bot", `Chào ${name}! ${d.question}`);
    speak(d.question);
  }

  async function handleSend() {
    const val = document.getElementById("userInput").value;
    if(!val) return;
    addMsg("user", val);
    document.getElementById("userInput").value = "";
    
    const r = await fetch("/units/answer", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({answer: val})
    });
    const d = await r.json();

    if(d.score !== undefined) { 
      scores.push(parseFloat(d.score)); 
      addFeedback(d.score, d.feedback); 
    }

    if(d.next_question) {
      setTimeout(() => { 
        addMsg("bot", d.next_question); 
        speak(d.next_question); 
      }, 800);
    } else {
      // Khi không còn câu hỏi nào nữa
      showFinalResult();
    }
  }

  function showFinalResult() {
    if(scores.length > 0) {
      const avg = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
      const div = document.getElementById("chat");
      div.innerHTML += `
        <div class="final-score">
          🎉 HOÀN THÀNH BÀI TẬP!<br>
          Học sinh: <b>${name}</b><br>
          ĐIỂM TRUNG BÌNH: <span style="font-size: 1.5em; color: #d32f2f;">${avg}/10</span>
        </div>`;
      div.scrollTop = div.scrollHeight;
      speak(`Congratulations ${name}! You finished the lesson with an average score of ${avg}`);
    }
  }

  function addMsg(role, text) {
    const div = document.getElementById("chat");
    div.innerHTML += `<div class="${role}-msg"><b>${role=='bot'?'🤖 Bot':'👤 You'}:</b> ${text}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  function addFeedback(score, text) {
    const color = score >= 8 ? "#27ae60" : (score >= 5 ? "#f39c12" : "#e74c3c");
    document.getElementById("chat").innerHTML += `
      <div class="feedback-box">
        <div class="score-circle" style="background:${color}">${score}</div>
        <div style="font-size:0.9em; flex:1;">${text}</div>
      </div>`;
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  }

  function speak(t) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t);
    m.lang = 'en-US'; m.rate = 0.9;
    window.speechSynthesis.speak(m);
  }

  function toggleMic() {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Rec) return alert("Không hỗ trợ Mic");
    const btn = document.getElementById("micBtn");
    if(!isListening) {
      recognition = new Rec(); recognition.lang = 'en-US'; recognition.continuous = true;
      recognition.onstart = () => { isListening = true; btn.innerText = "🛑"; btn.style.background = "#e74c3c"; };
      recognition.onresult = (e) => { 
        let current = "";
        for (let i = 0; i < e.results.length; i++) { current += e.results[i][0].transcript; }
        document.getElementById("userInput").value = current; 
      };
      recognition.start();
    } else {
      recognition.stop(); isListening = false; btn.innerText = "🎤"; btn.style.background = "#4facfe";
      setTimeout(handleSend, 500);
    }
  }

  getUnits();
</script>
</body>
</html>
